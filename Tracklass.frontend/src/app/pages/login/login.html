<div class="auth-page">
  <div class="auth-card">

    <div class="auth-header">
      <mat-icon class="auth-logo">school</mat-icon>
      <h1 class="auth-title">Tracklass</h1>
      <p class="auth-subtitle">Iniciá sesión para continuar</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="auth-form">

      <mat-form-field appearance="outline">
        <mat-label>Email</mat-label>
        <input matInput type="email" formControlName="email" autocomplete="email">
        <mat-icon matPrefix>email</mat-icon>
        <mat-error *ngIf="form.controls.email.hasError('required')">
          El email es requerido
        </mat-error>
        <mat-error *ngIf="form.controls.email.hasError('email')">
          Email inválido
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Contraseña</mat-label>
        <input matInput [type]="hidePassword ? 'password' : 'text'"
               formControlName="password" autocomplete="current-password">
        <mat-icon matPrefix>lock</mat-icon>
        <button mat-icon-button matSuffix type="button"
                (click)="hidePassword = !hidePassword">
          <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
        <mat-error *ngIf="form.controls.password.hasError('required')">
          La contraseña es requerida
        </mat-error>
        <mat-error *ngIf="form.controls.password.hasError('minlength')">
          Mínimo 6 caracteres
        </mat-error>
      </mat-form-field>

      <button mat-flat-button color="primary" type="submit"
              class="auth-submit" [disabled]="loading">
        <mat-icon *ngIf="!loading">login</mat-icon>
        <span *ngIf="loading" class="spinner"></span>
        {{ loading ? 'Ingresando...' : 'Iniciar sesión' }}
      </button>

    </form>

    <div class="auth-footer">
      <span>¿No tenés cuenta?</span>
      <a routerLink="/register" class="auth-link">Registrate</a>
    </div>

  </div>
</div>
