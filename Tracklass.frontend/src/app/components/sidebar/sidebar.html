<aside class="sidebar">
  <div class="sidebar-header">
    <mat-icon class="logo-icon">school</mat-icon>
    <span class="logo-text">Tracklass</span>
  </div>

  <nav class="sidebar-nav">
    <a routerLink="/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="nav-item">
      <mat-icon>grid_view</mat-icon>
      <span>Dashboard</span>
    </a>
    <a routerLink="/alumnos" routerLinkActive="active" class="nav-item">
      <mat-icon>people</mat-icon>
      <span>Alumnos</span>
    </a>
    <a routerLink="/agenda" routerLinkActive="active" class="nav-item">
      <mat-icon>calendar_month</mat-icon>
      <span>Agenda</span>
    </a>
    <a routerLink="/pagos" routerLinkActive="active" class="nav-item">
      <mat-icon>account_balance_wallet</mat-icon>
      <span>Pagos</span>
    </a>
  </nav>

  <div class="sidebar-footer">
    <div class="profile-section">
      <div class="avatar">{{ authService.getIniciales() }}</div>
      <div class="profile-info">
        <span class="profile-name">{{ authService.getNombre() }}</span>
        <span class="profile-plan">{{ authService.getEmail() }}</span>
      </div>
    </div>
    <button class="logout-btn" (click)="logout()">
      <mat-icon>logout</mat-icon>
      <span>Cerrar sesión</span>
    </button>
  </div>

</aside>
